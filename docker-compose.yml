version: "3"

services:

    namenode:
        image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
        container_name: namenode
        restart: always
        ports:
            - "9870:9870"
            - "9010:9000"
        volumes:
            - hadoop_namenode:/hadoop/dfs/name
        environment:
            - CLUSTER_NAME=test
            - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
        env_file:
            - ./hadoop.env

    datanode:
        image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
        container_name: datanode
        restart: always
        volumes:
            - hadoop_datanode:/hadoop/dfs/data
        environment:
            SERVICE_PRECONDITION: "namenode:9870"
            CORE_CONF_fs_defaultFS: hdfs://namenode:9000
        ports:
            - "9864:9864"
        env_file:
            - ./hadoop.env

    resourcemanager:
        image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
        container_name: resourcemanager
        restart: always
        environment:
            SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
        env_file:
            - ./hadoop.env

    nodemanager:
        image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
        container_name: nodemanager
        restart: always
        environment:
            SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
        env_file:
            - ./hadoop.env

    historyserver:
        image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
        container_name: historyserver
        restart: always
        environment:
            SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
        volumes:
            - hadoop_historyserver:/hadoop/yarn/timeline
        env_file:
            - ./hadoop.env

    spark-master:
        image: bde2020/spark-master:3.0.0-hadoop3.2
        container_name: spark-master
        depends_on:
            - namenode
            - datanode
        ports:
            - "8085:8080"
            - "7077:7077"
        environment:
            - INIT_DAEMON_STEP=setup_spark
            - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
        volumes:
            - ./spark_streaming.py:/opt/spark-apps/spark_streaming.py

    spark-worker:
        image: bde2020/spark-worker:3.0.0-hadoop3.2
        container_name: spark-worker
        depends_on:
            - spark-master
        ports:
            - "8081:8081"
        environment:
            - SPARK_MASTER=spark://spark-master:7077
            - CORE_CONF_fs_defaultFS=hdfs://namenode:9000

    hive-server:
        image: bde2020/hive:2.3.2-postgresql-metastore
        container_name: hive-server
        depends_on:
            - namenode
            - datanode
            - hive-metastore
        env_file:
            - ./hadoop-hive.env
        environment:
            HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://hive-metastore-postgresql/metastore"
            SERVICE_PRECONDITION: "hive-metastore:9083"
        ports:
            - "10000:10000"

    hive-metastore:
        image: bde2020/hive:2.3.2-postgresql-metastore
        container_name: hive-metastore
        env_file:
            - ./hadoop-hive.env
        command: /opt/hive/bin/hive --service metastore
        environment:
            SERVICE_PRECONDITION: "namenode:9870 datanode:9864 hive-metastore-postgresql:5432"
        ports:
            - "9083:9083"

    hive-metastore-postgresql:
        image: bde2020/hive-metastore-postgresql:2.3.0
        container_name: hive-metastore-postgresql
        ports:
            - "5432:5432"

    presto-coordinator:
        image: shawnzhu/prestodb:0.181
        container_name: presto-coordinator
        ports:
            - "8089:8089"

    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.1
        container_name: zookeeper
        environment:
            - ZOOKEEPER_CLIENT_PORT=2181
        ports:
            - "2181:2181"

    kafka:
        image: confluentinc/cp-kafka:7.5.1
        container_name: broker
        depends_on:
            - zookeeper
        environment:
            - KAFKA_BROKER_ID=1
            - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
            - KAFKA_LISTENERS=DOCKER://0.0.0.0:29092,LOCALHOST://0.0.0.0:9092
            - KAFKA_ADVERTISED_LISTENERS=DOCKER://broker:29092,LOCALHOST://localhost:9092
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=DOCKER:PLAINTEXT,LOCALHOST:PLAINTEXT
            - KAFKA_INTER_BROKER_LISTENER_NAME=DOCKER
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
        ports:
            - "9092:9092"
            - "29092:29092"

volumes:
    hadoop_namenode:
    hadoop_datanode:
    hadoop_historyserver:
